<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Yurei.Perfume</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Minimal navbar di halaman auth -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Yurei<span>.</span>Perfume</a>
    <div class="nav-actions">
      <a href="cart.html" class="btn-cart">
        🛒 <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </div>
</nav>

<!-- AUTH PAGE -->
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Yurei<span>.</span>Perfume</div>
    <div class="auth-sub">Masuk ke akun kamu</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input
          type="email"
          class="form-input"
          id="loginEmail"
          placeholder="contoh@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPass">Password</label>
        <input
          type="password"
          class="form-input"
          id="loginPass"
          placeholder="Masukkan password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        Masuk →
      </button>
    </form>

    <div class="auth-divider"><span>atau</span></div>

    <a href="index.html" class="btn btn-outline btn-full">
      Lanjut sebagai Tamu
    </a>

    <div class="auth-switch">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>

    <!-- Demo hint -->
    <div style="
      margin-top:20px;
      padding:12px 16px;
      background:var(--accent-bg);
      border-radius:var(--radius-sm);
      font-size:.8rem;
      color:var(--accent);
      line-height:1.6;
    ">
      💡 <strong>Demo:</strong> Daftar akun baru terlebih dahulu, lalu login dengan email & password yang sama.
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/script.js"></script>
</body>
</html>
